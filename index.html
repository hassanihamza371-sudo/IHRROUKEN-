  /* TABS */
  .tabs {

  .tab-btn {
    padding: 14px 22px;

    background: none;

    border-bottom: 3px solid transparent;

  .tab-btn:hover { color: var(--green); }

  /* MAIN */
  .main {
    max-width: 1400px;

    padding: 24px 28px;
  }

  /* SECTION */
  .section { display: none; }
  .section.active { display: block; }

  /* KPI CARDS */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 28px;

  .kpi-card {
    background: white;
    border-radius: 14px;
    padding: 20px;
    box-shadow: var(--shadow);
    border-right: 4px solid;
    position: relative;
    overflow: hidden;

  .kpi-card::before {
    content: '';
    position: absolute;
    top: -20px; left: -20px;
    width: 80px; height: 80px;
    border-radius: 50%;
    opacity: 0.07;
  }
  .kpi-card.green { border-right-color: var(--green); }
  .kpi-card.green::before { background: var(--green); }
  .kpi-card.gold { border-right-color: var(--gold); }
  .kpi-card.gold::before { background: var(--gold); }
  .kpi-card.red { border-right-color: var(--red); }
  .kpi-card.red::before { background: var(--red); }
  .kpi-card.blue { border-right-color: var(--blue); }
  .kpi-card.blue::before { background: var(--blue); }

  .kpi-label { font-size: 12px; color: var(--gray-400); font-weight: 500; margin-bottom: 8px; }
  .kpi-value { font-size: 26px; font-weight: 900; line-height: 1; }
  .kpi-card.green .kpi-value { color: var(--green); }
  .kpi-card.gold .kpi-value { color: var(--gold); }
  .kpi-card.red .kpi-value { color: var(--red); }
  .kpi-card.blue .kpi-value { color: var(--blue); }
  .kpi-sub { font-size: 11px; color: var(--gray-400); margin-top: 6px; }
  .kpi-icon { font-size: 28px; position: absolute; top: 16px; left: 16px; opacity: 0.15; }

  /* PANELS */
  .panel {
    background: white;
    border-radius: 14px;
    box-shadow: var(--shadow);
    margin-bottom: 20px;
    overflow: hidden;
  }
  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--gray-200);
    background: linear-gradient(135deg, var(--green-pale), white);
  }
  .panel-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--green-dark);
    display: flex; align-items: center; gap: 8px;
  }
  .btn {
    padding: 8px 16px;
    border-radius: 8px;
    font-family: 'Cairo', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .btn-green { background: var(--green); color: white; }
  .btn-green:hover { background: var(--green-dark); }
  .btn-gold { background: var(--gold); color: white; }
  .btn-gold:hover { background: #a8863a; }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn-red { background: var(--red-pale); color: var(--red); border: 1px solid #f5c6c0; }
  .btn-red:hover { background: var(--red); color: white; }

  /* TABLE */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead { background: var(--gray-100); }
  th {
    padding: 11px 14px;
    text-align: right;
    font-weight: 700;
    color: var(--green-dark);
    font-size: 12px;
    border-bottom: 2px solid var(--gray-200);
    white-space: nowrap;
  }

function saveIncome() {
  const d = {
    date: document.getElementById('iDate').value,
    source: document.getElementById('iSource').value,
    desc: document.getElementById('iDesc').value,
    amount: parseFloat(document.getElementById('iAmount').value)||0,
    method: document.getElementById('iMethod').value,
    notes: document.getElementById('iNotes').value
  };
  if (!d.date || !d.amount) { alert('يرجى ملء الحقول الإلزامية'); return; }
  data.income.push(d);
  save(); closeModal('modalIncome');
  ['iDate','iSource','iDesc','iAmount','iNotes'].forEach(id => document.getElementById(id).value='');
  render();
}

function saveExpense() {
  const d = {
    date: document.getElementById('eDate').value,
    cat: document.getElementById('eCat').value,
    desc: document.getElementById('eDesc').value,
    amount: parseFloat(document.getElementById('eAmount').value)||0,
    vendor: document.getElementById('eVendor').value,
    method: document.getElementById('eMethod').value
  };
  if (!d.date || !d.amount) { alert('يرجى ملء الحقول الإلزامية'); return; }
  data.expenses.push(d);
  save(); closeModal('modalExpense');
  ['eDate','eCat','eDesc','eAmount','eVendor'].forEach(id => document.getElementById(id).value='');
  render();
}

function saveMember() {
  const d = {
    name: document.getElementById('mName').value,
    role: document.getElementById('mRole').value,
    phone: document.getElementById('mPhone').value,
    join: document.getElementById('mJoin').value,
    shares: document.getElementById('mShares').value
  };
  if (!d.name) { alert('يرجى إدخال الاسم'); return; }
  data.members.push(d);
  save(); closeModal('modalMember');
  ['mName','mPhone','mJoin','mShares'].forEach(id => document.getElementById(id).value='');
  render();
}

function saveEquipment() {
  const d = {
    name: document.getElementById('qName').value,
    brand: document.getElementById('qBrand').value,
    date: document.getElementById('qDate').value,
    price: parseFloat(document.getElementById('qPrice').value)||0,
    status: document.getElementById('qStatus').value,
    maint: document.getElementById('qMaint').value,
    notes: document.getElementById('qNotes').value
  };
  if (!d.name) { alert('يرجى إدخال اسم المعدة'); return; }
  data.equipment.push(d);
  save(); closeModal('modalEquipment');
  ['qName','qBrand','qDate','qPrice','qMaint','qNotes'].forEach(id => document.getElementById(id).value='');
  render();
}

// ===== DELETE =====
function delService(i) { if(confirm('حذف هذه الخدمة؟')) { data.services.splice(i,1); save(); render(); } }
function delIncome(i) { if(confirm('حذف هذا المدخول؟')) { data.income.splice(i,1); save(); render(); } }
function delExpense(i) { if(confirm('حذف هذا المصروف؟')) { data.expenses.splice(i,1); save(); render(); } }

// ===== RENDER =====
function render() {
  const totalIncome = data.income.reduce((s,x)=>s+x.amount,0);
  const totalExpense = data.expenses.reduce((s,x)=>s+x.amount,0);
  const balance = totalIncome - totalExpense;

  document.getElementById('kpi-income').textContent = fmt(totalIncome);
  document.getElementById('kpi-expenses').textContent = fmt(totalExpense);
  document.getElementById('kpi-balance').textContent = fmt(balance);
  document.getElementById('kpi-balance').style.color = balance >= 0 ? 'var(--green)' : 'var(--red)';
  document.getElementById('kpi-services').textContent = data.services.length;

  // Month stats
  const thisMonth = new Date().toISOString().slice(0,7);
  const mIncome = data.income.filter(x=>x.date&&x.date.startsWith(thisMonth)).reduce((s,x)=>s+x.amount,0);
  const mExp = data.expenses.filter(x=>x.date&&x.date.startsWith(thisMonth)).reduce((s,x)=>s+x.amount,0);
  const pending = data.services.filter(x=>x.status==='مجدولة'||x.status==='جارية').length;
  document.getElementById('stat-month-income').textContent = fmt(mIncome);
  document.getElementById('stat-month-exp').textContent = fmt(mExp);
  document.getElementById('stat-pending').textContent = pending;
  document.getElementById('stat-members').textContent = data.members.length;

  // Recent table
  const all = [
    ...data.income.map(x=>({date:x.date, type:'مدخول', desc:x.desc||x.source, amount:x.amount, status:'green'})),
    ...data.expenses.map(x=>({date:x.date, type:'مصروف', desc:x.desc||x.cat, amount:-x.amount, status:'red'})),
    ...data.services.filter(x=>x.status==='منجزة').map(x=>({date:x.date, type:'خدمة', desc:x.type+' - '+x.client, amount:x.price, status:'blue'}))
  ].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,10);

  const rt = document.getElementById('recentTable');
  if (all.length === 0) {
    rt.innerHTML = '<tr><td colspan="5"><div class="empty-state"><div class="empty-icon">📋</div><p>لا توجد عمليات بعد.</p></div></td></tr>';
  } else {
    rt.innerHTML = all.map(x=>`<tr>
      <td>${x.date}</td>
      <td><span class="badge badge-${x.status}">${x.type}</span></td>
      <td>${x.desc}</td>
      <td style="font-weight:700;color:${x.amount>=0?'var(--green)':'var(--red)'};">${x.amount>=0?'+':''}${fmt(Math.abs(x.amount))}</td>
      <td>—</td>
    </tr>`).join('');
  }

  // Expense breakdown
  const cats = {};
  data.expenses.forEach(x=>{ cats[x.cat||'أخرى'] = (cats[x.cat||'أخرى']||0)+x.amount; });
  const eb = document.getElementById('expenseBreakdown');
  if (Object.keys(cats).length === 0) {
    eb.innerHTML = '<div class="empty-state"><div class="empty-icon">📊</div><p>أضف مصاريف لعرض التوزيع</p></div>';
  } else {
    const maxVal = Math.max(...Object.values(cats));
    const colors = ['var(--green)','var(--gold)','var(--blue)','var(--red)','#8e44ad','#e67e22'];
    eb.innerHTML = Object.entries(cats).map(([k,v],i)=>`
      <div class="prog-row">
        <div class="prog-label">${k}</div>
        <div class="prog-bar"><div class="prog-fill" style="width:${Math.round(v/maxVal*100)}%;background:${colors[i%colors.length]};"></div></div>
        <div class="prog-val" style="color:${colors[i%colors.length]};">${fmt(v)} د</div>
      </div>`).join('');
  }

  // Services table
  const st = document.getElementById('servicesTable');
  if (data.services.length === 0) {
    st.innerHTML = '<tr><td colspan="9"><div class="empty-state"><div class="empty-icon">🚜</div><p>لا توجد خدمات مسجلة بعد</p></div></td></tr>';
  } else {
    st.innerHTML = data.services.map((s,i)=>`<tr>
      <td>${i+1}</td>
      <td>${s.date}</td>
      <td><strong>${s.type}</strong></td>
      <td>${s.client}</td>
      <td>${s.area||'—'}</td>
      <td style="font-weight:700;color:var(--green);">${fmt(s.price)}</td>
      <td>${badgeHtml(s.status)}</td>
      <td style="font-size:12px;color:var(--gray-400);">${s.notes||'—'}</td>
      <td><button class="btn btn-red btn-sm" onclick="delService(${i})">🗑</button></td>
    </tr>`).join('');
  }

  // Income table
  const it = document.getElementById('incomeTable');
  if (data.income.length === 0) {
    it.innerHTML = '<tr><td colspan="7"><div class="empty-state"><div class="empty-icon">💰</div><p>لا توجد مداخيل مسجلة بعد</p></div></td></tr>';
  } else {
    it.innerHTML = data.income.map((x,i)=>`<tr>
      <td>${x.date}</td>
      <td><span class="badge badge-green">${x.source||'—'}</span></td>
      <td>${x.desc||'—'}</td>
      <td style="font-weight:700;color:var(--green);">+${fmt(x.amount)}</td>
      <td>${x.method||'—'}</td>
      <td style="font-size:12px;color:var(--gray-400);">${x.notes||'—'}</td>
      <td><button class="btn btn-red btn-sm" onclick="delIncome(${i})">🗑</button></td>
    </tr>`).join('');
  }

  // Expenses table
  const et = document.getElementById('expensesTable');
  if (data.expenses.length === 0) {
    et.innerHTML = '<tr><td colspan="7"><div class="empty-state"><div class="empty-icon">📋</div><p>لا توجد مصاريف مسجلة بعد</p></div></td></tr>';
  } else {
    et.innerHTML = data.expenses.map((x,i)=>`<tr>
      <td>${x.date}</td>
      <td><span class="badge badge-gold">${x.cat||'—'}</span></td>
      <td>${x.desc||'—'}</td>
      <td style="font-weight:700;color:var(--red);">-${fmt(x.amount)}</td>
      <td>${x.vendor||'—'}</td>
      <td>${x.method||'—'}</td>
      <td><button class="btn btn-red btn-sm" onclick="delExpense(${i})">🗑</button></td>
    </tr>`).join('');
  }

  // Members table
  document.getElementById('membersTable').innerHTML = data.members.map((m,i)=>`<tr>
    <td>${i+1}</td>
    <td><strong>${m.name}</strong></td>
    <td><span class="badge badge-green">${m.role}</span></td>
    <td>${m.phone||'—'}</td>
    <td>${m.join||'—'}</td>
    <td>${m.shares||1}</td>
    <td><span class="badge badge-green">نشيط</span></td>
  </tr>`).join('');

  // Equipment table
  document.getElementById('equipTable').innerHTML = data.equipment.map((e,i)=>`<tr>
    <td>${i+1}</td>
    <td><strong>${e.name}</strong></td>
    <td>${e.brand||'—'}</td>
    <td>${e.date||'—'}</td>
    <td style="font-weight:700;">${fmt(e.price)}</td>
    <td>${badgeHtml(e.status||'صالحة للاستخدام')}</td>
    <td>${e.maint||'—'}</td>
    <td style="font-size:12px;color:var(--gray-400);">${e.notes||'—'}</td>
  </tr>`).join('');
}

// Header date
document.getElementById('headerDate').textContent = new Date().toLocaleDateString('ar-MA', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

render();
